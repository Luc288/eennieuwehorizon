[build]
  command = "hugo --minify"
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  HUGO_VERSION = "0.162.1"
  # Deze waarden zijn geen echte geheimen (e-mailadres, servernaam, poort).
  # SMTP_PASS staat hier bewust NIET tussen, zodat het wachtwoord wel gescand blijft.
  SECRETS_SCAN_OMIT_KEYS = "SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_FROM,MAIL_TO"
